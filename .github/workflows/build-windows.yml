name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download ASIO SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.steinberg.net/asiosdk" -OutFile asiosdk.zip
          Expand-Archive -Path asiosdk.zip -DestinationPath asiosdk
          $sdkDir = (Get-ChildItem -Path asiosdk -Directory | Select-Object -First 1).FullName
          echo "ASIO_SDK_DIR=$sdkDir/common" >> $env:GITHUB_ENV

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded "-DCMAKE_CXX_FLAGS=/I`"${{ env.ASIO_SDK_DIR }}`""

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $artefacts = "build/src/orbital-bass-engine_artefacts/Release"

          Compress-Archive -Path "$artefacts/Standalone/*.exe" `
            -DestinationPath orbital-bass-engine-windows-standalone.zip

          Compress-Archive -Path "$artefacts/VST3/orbital-bass-engine.vst3" `
            -DestinationPath orbital-bass-engine-windows-vst3.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-windows
          path: |
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip
