name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Codesign
        run: |
          ARTEFACTS=build/src/orbital-bass-engine_artefacts/Release
          codesign --force --deep -s - "$ARTEFACTS/Standalone/orbital-bass-engine.app"
          codesign --force --deep -s - "$ARTEFACTS/AU/orbital-bass-engine.component"
          codesign --force --deep -s - "$ARTEFACTS/VST3/orbital-bass-engine.vst3"

      - name: Build DMG
        run: |
          ARTEFACTS=build/src/orbital-bass-engine_artefacts/Release
          DMG_STAGING=dmg-staging

          mkdir -p "$DMG_STAGING"
          cp -R "$ARTEFACTS/Standalone/orbital-bass-engine.app" "$DMG_STAGING/"
          cp -R "$ARTEFACTS/AU/orbital-bass-engine.component" "$DMG_STAGING/"
          cp -R "$ARTEFACTS/VST3/orbital-bass-engine.vst3" "$DMG_STAGING/"

          hdiutil create -volname "Orbital Bass Engine" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            orbital-bass-engine-macos.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-macos
          path: orbital-bass-engine-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $artefacts = "build/src/orbital-bass-engine_artefacts/Release"

          Compress-Archive -Path "$artefacts/Standalone/*.exe" `
            -DestinationPath orbital-bass-engine-windows-standalone.zip

          Compress-Archive -Path "$artefacts/VST3/orbital-bass-engine.vst3" `
            -DestinationPath orbital-bass-engine-windows-vst3.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-windows
          path: |
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orbital-bass-engine-macos.dmg
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip
