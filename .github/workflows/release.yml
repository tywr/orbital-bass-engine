name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Codesign
        run: |
          ARTEFACTS=build/src/orbital-bass-engine_artefacts/Release
          codesign --force --deep -s - "$ARTEFACTS/Standalone/orbital-bass-engine.app"
          codesign --force --deep -s - "$ARTEFACTS/AU/orbital-bass-engine.component"
          codesign --force --deep -s - "$ARTEFACTS/VST3/orbital-bass-engine.vst3"

      - name: Package zips
        run: |
          ARTEFACTS=build/src/orbital-bass-engine_artefacts/Release

          ditto -c -k --sequesterRsrc --keepParent \
            "$ARTEFACTS/Standalone/orbital-bass-engine.app" \
            orbital-bass-engine-macos-standalone.zip

          ditto -c -k --sequesterRsrc --keepParent \
            "$ARTEFACTS/AU/orbital-bass-engine.component" \
            orbital-bass-engine-macos-au.zip

          ditto -c -k --sequesterRsrc --keepParent \
            "$ARTEFACTS/VST3/orbital-bass-engine.vst3" \
            orbital-bass-engine-macos-vst3.zip

      - name: Build installer
        run: |
          ARTEFACTS=build/src/orbital-bass-engine_artefacts/Release

          pkgbuild --root "$ARTEFACTS/Standalone" \
            --identifier com.tywr.orbital-bass-engine.standalone \
            --install-location /Applications \
            standalone.pkg

          pkgbuild --root "$ARTEFACTS/AU" \
            --identifier com.tywr.orbital-bass-engine.au \
            --install-location "/Library/Audio/Plug-Ins/Components" \
            au.pkg

          pkgbuild --root "$ARTEFACTS/VST3" \
            --identifier com.tywr.orbital-bass-engine.vst3 \
            --install-location "/Library/Audio/Plug-Ins/VST3" \
            vst3.pkg

          cat > distribution.xml << 'DIST'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>Orbital Bass Engine</title>
              <options customize="allow" require-scripts="false"/>
              <choices-outline>
                  <line choice="standalone"/>
                  <line choice="au"/>
                  <line choice="vst3"/>
              </choices-outline>
              <choice id="standalone" title="Standalone App" description="Install to /Applications">
                  <pkg-ref id="com.tywr.orbital-bass-engine.standalone"/>
              </choice>
              <choice id="au" title="AU Plugin" description="Install to /Library/Audio/Plug-Ins/Components">
                  <pkg-ref id="com.tywr.orbital-bass-engine.au"/>
              </choice>
              <choice id="vst3" title="VST3 Plugin" description="Install to /Library/Audio/Plug-Ins/VST3">
                  <pkg-ref id="com.tywr.orbital-bass-engine.vst3"/>
              </choice>
              <pkg-ref id="com.tywr.orbital-bass-engine.standalone">standalone.pkg</pkg-ref>
              <pkg-ref id="com.tywr.orbital-bass-engine.au">au.pkg</pkg-ref>
              <pkg-ref id="com.tywr.orbital-bass-engine.vst3">vst3.pkg</pkg-ref>
          </installer-gui-script>
          DIST

          productbuild --distribution distribution.xml \
            --package-path . \
            orbital-bass-engine-macos-installer.pkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-macos
          path: |
            orbital-bass-engine-macos-standalone.zip
            orbital-bass-engine-macos-au.zip
            orbital-bass-engine-macos-vst3.zip
            orbital-bass-engine-macos-installer.pkg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $artefacts = "build/src/orbital-bass-engine_artefacts/Release"

          Compress-Archive -Path "$artefacts/Standalone/*.exe" `
            -DestinationPath orbital-bass-engine-windows-standalone.zip

          Compress-Archive -Path "$artefacts/VST3/orbital-bass-engine.vst3" `
            -DestinationPath orbital-bass-engine-windows-vst3.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-windows
          path: |
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orbital-bass-engine-macos-installer.pkg
            orbital-bass-engine-macos-standalone.zip
            orbital-bass-engine-macos-au.zip
            orbital-bass-engine-macos-vst3.zip
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip
