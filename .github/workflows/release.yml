name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          ARTEFACTS=build/src/orbital-bass-engine_artefacts/Release

          ditto -c -k --sequesterRsrc --keepParent \
            "$ARTEFACTS/Standalone/orbital-bass-engine.app" \
            orbital-bass-engine-macos-standalone.zip

          ditto -c -k --sequesterRsrc --keepParent \
            "$ARTEFACTS/AU/orbital-bass-engine.component" \
            orbital-bass-engine-macos-au.zip

          ditto -c -k --sequesterRsrc --keepParent \
            "$ARTEFACTS/VST3/orbital-bass-engine.vst3" \
            orbital-bass-engine-macos-vst3.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-macos
          path: |
            orbital-bass-engine-macos-standalone.zip
            orbital-bass-engine-macos-au.zip
            orbital-bass-engine-macos-vst3.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $artefacts = "build/src/orbital-bass-engine_artefacts/Release"

          Compress-Archive -Path "$artefacts/Standalone/*.exe" `
            -DestinationPath orbital-bass-engine-windows-standalone.zip

          Compress-Archive -Path "$artefacts/VST3/orbital-bass-engine.vst3" `
            -DestinationPath orbital-bass-engine-windows-vst3.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-windows
          path: |
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orbital-bass-engine-macos-standalone.zip
            orbital-bass-engine-macos-au.zip
            orbital-bass-engine-macos-vst3.zip
            orbital-bass-engine-windows-standalone.zip
            orbital-bass-engine-windows-vst3.zip
