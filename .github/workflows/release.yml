name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          cd build/src/orbital-bass-engine_artefacts/Release/Standalone
          zip -r "$GITHUB_WORKSPACE/orbital-bass-engine-macos.zip" *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-macos
          path: orbital-bass-engine-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path build/src/orbital-bass-engine_artefacts/Release/Standalone/*.exe -DestinationPath orbital-bass-engine-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbital-bass-engine-windows
          path: orbital-bass-engine-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: orbital-bass-engine-windows

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orbital-bass-engine-macos.zip
            orbital-bass-engine-windows.zip
